<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>بصر | Basar App</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#2a9090"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="بصر"/>
<meta name="application-name" content="بصر"/>
<meta name="description" content="تطبيق بصر لحفظ الوصفات الطبية للعائلة"/>

<!-- Open Graph -->
<meta property="og:title" content="بصر | Basar App"/>
<meta property="og:description" content="تطبيق لحفظ وصفات العيون الطبية لكامل العائلة"/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://basar-app.vercel.app"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --g1:#1f6f6f;
  --g2:#2a9090;
  --g3:#38b0b0;
  --g4:#62cccc;
  --gp:#e4f3f3;
  --gm:#eff8f8;
  --bg:#f5f3ee;
  --sur:#faf8f4;
  --card:#fefcf8;
  --inp:#edeae2;
  --bdr:#d4d8d0;
  --bds:#e6e3db;
  --tx:#2c2f2c;
  --txm:#5a6860;
  --txl:#9aaba4;
  --sh:rgba(42,144,144,.10);
  --shd:rgba(31,111,111,.14);
  --amb:#b87d2a;
  --red:#c05050;
  --blu:#3a6fa8;
  --pur:#7057a8;
  --r:14px;--rs:9px;--tr:.28s cubic-bezier(.4,0,.2,1);
}
[data-theme=dark]{
  --bg:#1e2328;
  --sur:#252b30;
  --card:#2b3138;
  --inp:#1a1f24;
  --gp:#1c2f2f;
  --gm:#182626;
  --bdr:#3a4248;
  --bds:#2e3640;
  --tx:#dce4e0;
  --txm:#8aa89e;
  --txl:#4d6360;
  --sh:rgba(56,176,176,.07);
  --shd:rgba(0,0,0,.35);
  --amb:#d4943a;
  --red:#d46060;
  --blu:#5a90c8;
  --pur:#9480c8;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background var(--tr),color var(--tr)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--g3);border-radius:3px}

/* bg */
.bgw{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bgw::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(42,144,144,.06) 0%,transparent 65%);top:-200px;right:-150px;animation:bgf 12s ease-in-out infinite}
.bgw::after{content:'';position:absolute;width:450px;height:450px;border-radius:50%;background:radial-gradient(circle,rgba(31,111,111,.05) 0%,transparent 65%);bottom:-150px;left:-100px;animation:bgf 15s ease-in-out infinite reverse}
.bgd{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,rgba(42,144,144,.05) 1px,transparent 1px);background-size:28px 28px;opacity:.4}
@keyframes bgf{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(15px,25px) scale(1.04)}}

/* topbar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,255,255,.9);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--bds);padding:9px 20px;display:flex;align-items:center;justify-content:space-between;transition:background var(--tr)}
[data-theme=dark] .topbar{background:rgba(30,35,40,.95)}
.tbrand{display:flex;align-items:center;gap:9px}
.tlogo{width:36px;height:36px;background:linear-gradient(135deg,var(--g2),var(--g1));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 3px 10px var(--sh)}
.tname{font-size:1rem;font-weight:800;background:linear-gradient(135deg,var(--g1),var(--g3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tnav{display:flex;gap:6px;align-items:center}
.navbtn{padding:7px 14px;border:1.5px solid var(--bdr);background:var(--sur);border-radius:9px;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;color:var(--txm);cursor:pointer;transition:all var(--tr)}
.navbtn:hover,.navbtn.active{border-color:var(--g2);color:var(--g2);background:var(--gp)}
.navbtn.active{background:linear-gradient(135deg,var(--g2),var(--g1));color:#fff;border-color:transparent}
.ibtn{width:36px;height:36px;border:1.5px solid var(--bdr);background:var(--sur);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all var(--tr)}
.ibtn:hover{border-color:var(--g2);background:var(--gp)}

/* main */
.main{position:relative;z-index:10;width:100%;max-width:900px;margin:0 auto;padding:78px 16px 50px}

/* pages */
.page{display:none}.page.active{display:block;animation:fadeU .5s ease}

/* ── PROFILE CARD ── */
.profile-hero{background:var(--card);border:1.5px solid var(--bdr);border-radius:22px;padding:30px 28px;margin-bottom:18px;position:relative;overflow:hidden;box-shadow:0 16px 50px var(--shd);animation:fadeU .6s ease}
.profile-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--g1),var(--g3),var(--g4))}
.profile-top{display:flex;align-items:flex-start;gap:22px;flex-wrap:wrap}

/* avatar */
.avatar-wrap{position:relative;flex-shrink:0}
.avatar{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--g3),var(--g1));display:flex;align-items:center;justify-content:center;font-size:38px;border:3px solid var(--bdr);overflow:hidden;cursor:pointer;transition:all var(--tr);box-shadow:0 6px 22px var(--shd)}
.avatar:hover{transform:scale(1.04);box-shadow:0 10px 30px var(--shd)}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-edit{position:absolute;bottom:2px;right:2px;width:26px;height:26px;background:linear-gradient(135deg,var(--g2),var(--g1));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;box-shadow:0 2px 8px var(--sh);border:2px solid var(--sur)}
#avatarInput{display:none}

/* profile info */
.profile-info{flex:1;min-width:200px}
.profile-name{font-size:1.5rem;font-weight:900;color:var(--tx);margin-bottom:4px}
.profile-meta{color:var(--txm);font-size:.85rem;font-family:'Tajawal',sans-serif;display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.profile-meta span{display:flex;align-items:center;gap:4px}
.profile-stats{display:flex;gap:14px;flex-wrap:wrap}
.stat-box{background:var(--inp);border:1.5px solid var(--bds);border-radius:11px;padding:10px 16px;text-align:center;min-width:80px}
.stat-num{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,var(--g1),var(--g3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-lbl{font-size:.7rem;color:var(--txm);margin-top:1px}

.profile-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}

/* ── EDIT PROFILE MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;padding:16px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1.5px solid var(--bdr);border-radius:20px;padding:28px 24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;transform:scale(.94) translateY(10px);transition:transform .3s;box-shadow:0 24px 70px rgba(0,0,0,.3);position:relative}
.modal-overlay.open .modal{transform:scale(1) translateY(0)}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--g1),var(--g3),var(--g4));border-radius:20px 20px 0 0}
.modal-title{font-size:1.05rem;font-weight:800;color:var(--tx);margin-bottom:22px;display:flex;align-items:center;gap:8px}
.modal-close{position:absolute;top:14px;left:14px;width:30px;height:30px;border:1.5px solid var(--bdr);background:var(--inp);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all var(--tr)}
.modal-close:hover{border-color:var(--red);color:var(--red)}

/* form fields */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.frow.one{grid-template-columns:1fr}
.frow.three{grid-template-columns:1fr 1fr 1fr}
.fld{margin-bottom:0}
.fld label{display:block;font-size:.75rem;font-weight:700;color:var(--txm);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.fld label .req{color:var(--g3)}
.fi{width:100%;padding:10px 13px;background:var(--inp);border:1.5px solid var(--bdr);border-radius:var(--rs);color:var(--tx);font-family:'Cairo',sans-serif;font-size:.88rem;outline:none;transition:all var(--tr);appearance:none;-webkit-appearance:none}
.fi:focus{border-color:var(--g2);box-shadow:0 0 0 3px rgba(42,144,144,.13);background:var(--sur)}
.fi::placeholder{color:var(--txl)}
select.fi option{background:var(--sur)}
textarea.fi{resize:vertical;min-height:70px;font-family:'Tajawal',sans-serif;font-size:.85rem}

/* ── FAMILY SECTION ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:1rem;font-weight:800;color:var(--tx);display:flex;align-items:center;gap:7px}
.section-title span{font-size:20px}

/* family grid */
.family-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.member-card{background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);padding:18px;cursor:pointer;transition:all var(--tr);position:relative;overflow:hidden}
.member-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--g1),var(--g3));opacity:0;transition:opacity var(--tr)}
.member-card:hover{border-color:var(--g2);box-shadow:0 6px 22px var(--sh);transform:translateY(-2px)}
.member-card:hover::before{opacity:1}
.member-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.member-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
.member-name{font-size:.95rem;font-weight:800;color:var(--tx)}
.member-rel{font-size:.75rem;color:var(--txm);font-family:'Tajawal',sans-serif;margin-top:2px}
.rx-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.rx-badge{padding:3px 9px;border-radius:12px;font-size:.7rem;font-weight:700;display:flex;align-items:center;gap:3px}
.rx-badge.glasses{background:rgba(42,144,144,.12);color:var(--g2)}
.rx-badge.contacts{background:rgba(58,111,168,.11);color:var(--blu)}
.rx-badge.none{background:rgba(144,184,158,.1);color:var(--txl)}
.member-actions{display:flex;gap:6px}
.mabtn{flex:1;padding:7px;border:1.5px solid var(--bdr);background:var(--inp);border-radius:8px;font-family:'Cairo',sans-serif;font-size:.72rem;font-weight:700;color:var(--txm);cursor:pointer;transition:all var(--tr);display:flex;align-items:center;justify-content:center;gap:4px}
.mabtn:hover{border-color:var(--g2);color:var(--g2);background:var(--gp)}
.mabtn.del:hover{border-color:var(--red);color:var(--red);background:rgba(224,82,82,.07)}
.mabtn.wa:hover{border-color:#28b060;color:#28b060;background:rgba(40,176,96,.08)}
.mabtn.pdf:hover{border-color:var(--red);color:var(--red)}

/* add member card */
.add-member-card{background:var(--inp);border:2px dashed var(--bdr);border-radius:var(--r);padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all var(--tr);min-height:160px}
.add-member-card:hover{border-color:var(--g2);background:var(--gm)}
.add-member-card .plus{width:44px;height:44px;background:linear-gradient(135deg,var(--g2),var(--g1));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 4px 14px var(--sh)}
.add-member-card p{font-size:.85rem;color:var(--txm);font-weight:700}

/* ── RX DETAIL MODAL ── */
.rx-table{width:100%;border-collapse:collapse;margin:10px 0}
.rx-table th{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;padding:8px 10px;font-size:.78rem;text-align:center;font-weight:700}
.rx-table td{padding:9px 10px;text-align:center;font-size:.85rem;border-bottom:1px solid var(--bds)}
.rx-table tr:nth-child(even) td{background:var(--gm)}
.rx-table tr:last-child td{border-bottom:none}
.eye-label-td{font-weight:800;color:var(--g1);white-space:nowrap}

/* chips */
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:.78rem;font-weight:700}
.chip-g{background:rgba(42,144,144,.12);color:var(--g2)}
.chip-b{background:rgba(58,111,168,.11);color:var(--blu)}
.chip-a{background:rgba(184,125,42,.13);color:var(--amb)}
.chip-p{background:rgba(112,87,168,.11);color:var(--pur)}

/* disclaimer */
.disclaimer{background:linear-gradient(135deg,rgba(184,125,42,.08),rgba(184,125,42,.04));border:1.5px solid rgba(184,125,42,.28);border-radius:11px;padding:12px 16px;margin-top:16px;font-size:.78rem;color:#8a6018;font-family:'Tajawal',sans-serif;line-height:1.6;display:flex;gap:8px;align-items:flex-start}
.disclaimer-icon{font-size:18px;flex-shrink:0;margin-top:1px}

/* btn */
.btn{padding:10px 18px;border:none;border-radius:var(--rs);font-family:'Cairo',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all var(--tr);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn-p{background:linear-gradient(135deg,var(--g3),var(--g1));color:#fff;box-shadow:0 4px 16px var(--shd)}
.btn-p:hover{box-shadow:0 7px 22px var(--shd)}
.btn-wa{background:linear-gradient(135deg,#28b060,#1a7840);color:#fff;box-shadow:0 4px 14px rgba(40,176,96,.20)}
.btn-pdf{background:linear-gradient(135deg,var(--red),#c03030);color:#fff;box-shadow:0 4px 14px rgba(224,82,82,.28)}
.btn-o{background:transparent;border:1.5px solid var(--bdr);color:var(--txm)}
.btn-o:hover{border-color:var(--g2);color:var(--g2);background:var(--gp)}
.btn-del{background:transparent;border:1.5px solid var(--bdr);color:var(--txm)}
.btn-del:hover{border-color:var(--red);color:var(--red);background:rgba(224,82,82,.07)}
.btn-sm{padding:7px 13px;font-size:.78rem}

/* alert chip */
.alert-chip{padding:7px 14px;border:1.5px solid var(--bdr);background:var(--inp);border-radius:20px;font-size:.8rem;font-weight:700;color:var(--txm);cursor:pointer;transition:all var(--tr);display:inline-block;margin:3px}
.alert-chip:hover,.alert-chip.sel{border-color:var(--amb);background:rgba(184,125,42,.10);color:var(--amb)}
.sound-chip{padding:6px 12px;border:1.5px solid var(--bdr);background:var(--inp);border-radius:20px;font-size:.78rem;font-weight:600;color:var(--txm);cursor:pointer;transition:all var(--tr);display:inline-block;margin:3px}
.sound-chip.sel{border-color:var(--blu);background:rgba(58,111,168,.10);color:var(--blu)}

/* lens type chips */
.lchip{padding:6px 13px;border:1.5px solid var(--bdr);background:var(--inp);border-radius:20px;font-size:.78rem;font-weight:600;color:var(--txm);cursor:pointer;transition:all var(--tr);display:inline-block;margin:3px}
.lchip.sel{border-color:var(--g2);background:linear-gradient(135deg,var(--g2),var(--g1));color:#fff}

/* upload */
.uarea{border:2px dashed var(--bdr);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;transition:all var(--tr)}
.uarea:hover{border-color:var(--g2);background:var(--gm)}
.uarea.has{border-style:solid;border-color:var(--g2);background:var(--gp)}
.uarea .uicon{font-size:26px;margin-bottom:6px}
.uarea .utxt{font-size:.8rem;color:var(--txm);font-family:'Tajawal',sans-serif}
.upreview{max-width:100%;max-height:140px;border-radius:8px;margin-top:10px;object-fit:contain}

/* section sep */
.sep{height:1px;background:var(--bds);margin:22px 0}

/* toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:linear-gradient(135deg,var(--g1),var(--g3));color:#fff;padding:13px 20px;border-radius:12px;font-size:.88rem;font-weight:700;box-shadow:0 8px 24px var(--shd);transform:translateY(80px);opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}

/* confirm box */
.confirm-box{background:var(--card);border:1.5px solid var(--bdr);border-radius:16px;padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);transform:scale(.94);transition:transform .3s}
.modal-overlay.open .confirm-box{transform:scale(1)}

/* notif popup */
.notif-box{background:var(--card);border:1.5px solid var(--bdr);border-radius:20px;padding:26px 22px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}

/* empty */
.empty{text-align:center;padding:36px 20px;color:var(--txl)}
.empty-icon{font-size:46px;margin-bottom:10px}

/* rx form sections */
.rx-sec{background:var(--inp);border:1.5px solid var(--bds);border-radius:var(--r);padding:18px;margin-bottom:14px}
.rx-sec-title{font-size:.82rem;font-weight:800;color:var(--txm);margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:6px}
.rx-grid{display:grid;grid-template-columns:90px repeat(5,1fr);gap:7px}
.rx-grid.cl{grid-template-columns:90px repeat(6,1fr)}
.rx-hdr>div{background:var(--gp);border:1px solid var(--bdr);border-radius:7px;padding:6px 4px;text-align:center;font-size:.68rem;font-weight:800;color:var(--g1);text-transform:uppercase}
.rx-row>div{display:contents}
.eye-lbl{background:linear-gradient(135deg,var(--g2),var(--g1));border-radius:7px;padding:8px 6px;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;color:#fff;text-align:center;line-height:1.3}
.rxi{width:100%;padding:8px 5px;background:var(--sur);border:1.5px solid var(--bdr);border-radius:7px;color:var(--tx);font-family:'Cairo',sans-serif;font-size:.82rem;text-align:center;outline:none;transition:all var(--tr)}
.rxi:focus{border-color:var(--g2);box-shadow:0 0 0 2px rgba(42,144,144,.12)}
.rxi::placeholder{color:var(--txl);font-size:.72rem}

/* color avatars */
.av-blue{background:linear-gradient(135deg,#5a90c8,#2d5fa0)}
.av-pink{background:linear-gradient(135deg,#d87fa8,#a84d78)}
.av-pur{background:linear-gradient(135deg,#9480c8,#6040a8)}
.av-amb{background:linear-gradient(135deg,#d4943a,#a86c20)}
.av-grn{background:linear-gradient(135deg,var(--g3),var(--g1))}
.av-red{background:linear-gradient(135deg,#d47070,#a04040)}
.av-teal{background:linear-gradient(135deg,#40b8b0,#208880)}
.av-gray{background:linear-gradient(135deg,#80989a,#506068)}

@keyframes fadeU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeD{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  .profile-top{flex-direction:column;align-items:center;text-align:center}
  .profile-meta{justify-content:center}
  .profile-stats{justify-content:center}
  .frow,.frow.three{grid-template-columns:1fr}
  .family-grid{grid-template-columns:1fr}
  .rx-grid{grid-template-columns:70px repeat(5,1fr);font-size:.65rem}
  .rx-grid.cl{grid-template-columns:70px repeat(6,1fr)}
  .tnav .navbtn span{display:none}
  .main{padding:72px 12px 40px}
}

/* ── AUTH SCREEN ── */
#authScreen{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  transition:opacity .4s;
}
#authScreen.hidden{opacity:0;pointer-events:none}
.auth-card{
  background:var(--card);
  border:1.5px solid var(--bds);
  border-radius:24px;
  padding:36px 32px;
  width:100%;max-width:420px;
